name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  release:
    name: Build release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: light
            artifact: light
          - os: macos-latest
            target: all
            artifact: light-lumen
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set CalVer from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          chmod +x scripts/calver
          ver="${GITHUB_REF_NAME#v}"
          printf '%s\n' "$ver" > VERSION
          ./scripts/calver sync

      - name: Set CalVer from VERSION file
        if: github.event_name == 'workflow_dispatch'
        run: |
          chmod +x scripts/calver
          ./scripts/calver sync

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build
        run: |
          ver="$(./scripts/calver show)"
          if [ "${{ matrix.target }}" = "all" ]; then
            cargo build --release -p light -p lumen
            mkdir -p dist
            cp target/release/light dist/light-"$ver"-macos
            cp target/release/lumen dist/lumen-"$ver"-macos
          else
            cargo build --release -p light
            mkdir -p dist
            cp target/release/light dist/light-"$ver"-linux
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true